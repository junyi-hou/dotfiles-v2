name: Emacs Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  emacs-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-26
        emacs_version:
          - '30.1'
          - '30.2'
          - 'snapshot'
    steps:
      - uses: actions/checkout@v4

      - uses: purcell/setup-emacs@master
        with:
          - version: ${{ matrix.emacs_version }}

      - name: Run Emacs tests
        working-directory: modules/emacs.d
        run: bash run-tests.sh

  script-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pytest

      - name: Run tests
        run: make test
