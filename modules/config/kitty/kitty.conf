font_family      PragmataPro Mono Liga
font_size        12.0
cursor_blink_interval 0

# option acts as M- for all keys; cmd mapped explicitly below for common bindings
macos_option_as_alt yes

# remote control via escape sequence — needed for aerospace focus from SSH emacs
allow_remote_control yes

# enable OSC 52 clipboard read so terminal emacs can paste via escape sequence query
clipboard_control write-clipboard write-primary read-clipboard no-append

# ctrl-hjkl: pass to emacs if title contains "emacs"
map --when-focus-on title:[Ee][Mm][Aa][Cc][Ss] ctrl+h send_text all \x08
map --when-focus-on title:[Ee][Mm][Aa][Cc][Ss] ctrl+j send_text all \x0a
map --when-focus-on title:[Ee][Mm][Aa][Cc][Ss] ctrl+k send_text all \x0b
map --when-focus-on title:[Ee][Mm][Aa][Cc][Ss] ctrl+l send_text all \x0c

# else: call aerospace
map --when-focus-on "not title:[Ee][Mm][Aa][Cc][Ss]" ctrl+h launch --type=background sh -c "/opt/homebrew/bin/aerospace focus --boundaries all-monitors-outer-frame left; /opt/homebrew/bin/aerospace move-move window-lazy-center"
map --when-focus-on "not title:[Ee][Mm][Aa][Cc][Ss]" ctrl+j launch --type=background sh -c "/opt/homebrew/bin/aerospace focus --boundaries all-monitors-outer-frame down; /opt/homebrew/bin/aerospace move-move window-lazy-center"
map --when-focus-on "not title:[Ee][Mm][Aa][Cc][Ss]" ctrl+k launch --type=background sh -c "/opt/homebrew/bin/aerospace focus --boundaries all-monitors-outer-frame up; /opt/homebrew/bin/aerospace move-move window-lazy-center"
map --when-focus-on "not title:[Ee][Mm][Aa][Cc][Ss]" ctrl+l launch --type=background sh -c "/opt/homebrew/bin/aerospace focus --boundaries all-monitors-outer-frame right; /opt/homebrew/bin/aerospace move-move window-lazy-center"

# cmd as M- for bindings used in emacs config
# (cmd+v omitted — conflicts with paste; use option+v instead)
map cmd+j send_text all \x1bj
map cmd+k send_text all \x1bk
map cmd+x send_text all \x1bx
map cmd+enter send_text all \x1b\x0d
map cmd+u send_text all \x1bu
map cmd+i send_text all \x1bi
